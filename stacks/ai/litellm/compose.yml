services:
  litellm:
    build:
      context: .
      args:
        target: runtime
    image: ghcr.io/berriai/litellm:main-stable
    # Uncomment these lines to start proxy with config.yaml file
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./logs:/app/logs
    command:
      - "--config=/app/config.yaml"
    environment:
        DATABASE_URL: postgresql://triumph:admin123!@db:5432/litellm
        STORE_MODEL_IN_DB: "True" # allows adding models to proxy via UI
        REDIS_HOST: "redis"
        REDIS_PORT: "6379"
    env_file:
      - .env # Load local .env file
    depends_on:
      - redis
      - db
    labels:
      # Traefik 3.3 labels
      - "traefik.enable=true"
      - "traefik.http.routers.litellm.rule=Host(`litellm.triumphbox.dev`)"
      - "traefik.http.routers.litellm.entrypoints=websecure"
      - "traefik.http.routers.litellm.tls=true"
      - "traefik.http.routers.litellm.tls.certresolver=letsencrypt"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"
      # Middleware for security headers
      - "traefik.http.middlewares.litellm-security.headers.sslredirect=true"
      - "traefik.http.middlewares.litellm-security.headers.stsSeconds=31536000"
      - "traefik.http.routers.litellm.middlewares=litellm-security"
    restart: unless-stopped

  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: triumph
      POSTGRES_PASSWORD: admin123!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U triumph"]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  # prometheus:
  #   image: prom/prometheus
  #   volumes:
  #     - prometheus_data:/prometheus
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #     - '--storage.tsdb.retention.time=15d'
  #   restart: always

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
