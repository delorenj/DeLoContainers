model_list:
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: azure/gpt-35-turbo
      api_base: ${AZURE_API_BASE}
      api_key: ${AZURE_API_KEY}
      api_version: "2023-07-01-preview"

  - model_name: gpt-4
    litellm_params:
      model: azure/gpt-4
      api_base: ${AZURE_API_BASE}
      api_key: ${AZURE_API_KEY}
      api_version: "2023-07-01-preview"

  - model_name: claude-3-sonnet
    litellm_params:
      model: anthropic/claude-3-sonnet-20240229
      api_key:

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-pro
      api_key: ${GOOGLE_API_KEY}

  - model_name: openrouter-claude
    litellm_params:
      model: openrouter/claude-3.5-sonnet:beta
      api_key:
      api_base: "https://openrouter.ai/api/v1"

# Router settings
router_settings:
  routing_strategy: "simple-shuffle"  # Options: least-busy, usage-based, simple-shuffle
  num_retries: 3
  timeout: 30  # Seconds
  fallbacks: [
    {
      "gpt-4": ["openrouter-claude", "claude-3-sonnet"]
    }
  ]

# General settings
general_settings: 
  master_key: ${LITELLM_MASTER_KEY}
  database_url: ${DATABASE_URL}
  # Cache settings
  cache:
    type: redis
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    ttl: 3600  # Cache expiration in seconds
    async_redis: true  # Enable async Redis client

# Logging configuration  
logging:
  level: info
  log_requests: true
  log_responses: true
  log_file: "/app/logs/litellm.log"  # Log to file
  verbose: false

# Request/response configuration
server_settings:
  allow_model_override: true
  max_parallel_requests: 100
  timeout: 300
  environment: "production"  # Options: development, production
  health_check_path: "/health"
  cors:
    allow_origins: ["*"]
    allow_methods: ["*"]
    allow_headers: ["*"]

# Rate limiting
litellm_settings:
  success_callback: ["redis"]
  drop_params: ["api_key"]  # Remove sensitive data from logs
  set_verbose: false
  telemetry: false  # Disable telemetry

# Key management
key_management:
  max_budget: 0  # 0 means unlimited
  max_parallel_requests: 100
  budget_duration: "monthly"  # Options: daily, weekly, monthly

# Proxy admin UI settings
ui:
  enabled: true
  path: "/ui"
  auth_required: true
